<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#240005"/>
      <stop offset="100%" stop-color="#0c0002"/>
    </radialGradient>
    <linearGradient id="scales" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3355"/>
      <stop offset="60%" stop-color="#aa0022"/>
      <stop offset="100%" stop-color="#55000a"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffee00"/>
      <stop offset="60%" stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#ff2244" stroke-width="1.5"/>
  <!-- Dragon Horns -->
  <!-- Left Horn -->
  <path d="M22 24 C18 14, 10 16, 8 10 Q14 12, 20 20 Z" fill="#eeddcc" stroke="#aa9988" stroke-width="0.8"/>
  <!-- Right Horn -->
  <path d="M42 24 C46 14, 54 16, 56 10 Q50 12, 44 20 Z" fill="#eeddcc" stroke="#aa9988" stroke-width="0.8"/>
  <!-- Back spines -->
  <polygon points="32,10 28,20 36,20" fill="#aa0022"/>
  <polygon points="26,16 23,24 29,24" fill="#aa0022"/>
  <polygon points="38,16 41,24 35,24" fill="#aa0022"/>
  <!-- Dragon Head Base -->
  <path d="M32 48 L18 26 L24 22 L32 28 L40 22 L46 26 Z" fill="url(#scales)" stroke="#800" stroke-width="1"/>
  <!-- Cheek Spikes -->
  <polygon points="18,26 10,28 20,32" fill="#aa0022" stroke="#800" stroke-width="0.8"/>
  <polygon points="46,26 54,28 44,32" fill="#aa0022" stroke="#800" stroke-width="0.8"/>
  <!-- Snout / Nose -->
  <path d="M28 44 L32 50 L36 44 Z" fill="#55000a"/>
  <!-- Glowing Yellow Eyes -->
  <polygon points="23,29 29,32 25,33" fill="url(#eyeGlow)"/>
  <polygon points="25,30.5" x="25" y="30.5" r="1" fill="#fff"/>
  <polygon points="41,29 35,32 39,33" fill="url(#eyeGlow)"/>
  <polygon points="39,30.5" x="39" y="30.5" r="1" fill="#fff"/>
  <!-- Fire Breath Smoke (whisp at bottom) -->
  <path d="M26 52 Q32 55, 32 58 Q32 55, 38 52" stroke="#ff5500" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
</svg>
