<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#080014"/>
      <stop offset="100%" stop-color="#03000a"/>
    </radialGradient>
    <radialGradient id="petalGrad" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#ee88ff"/>
      <stop offset="60%" stop-color="#bb44ee"/>
      <stop offset="100%" stop-color="#7700bb"/>
    </radialGradient>
    <radialGradient id="centerGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffeeaa"/>
      <stop offset="100%" stop-color="#ddaa00"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc44ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#cc44ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften"><feGaussianBlur stdDeviation="1"/></filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#220033" stroke-width="1.5"/>
  <!-- Glow -->
  <circle cx="32" cy="36" r="22" fill="url(#glow)"/>
  <!-- Outer petals (8) -->
  <ellipse cx="32" cy="18" rx="4.5" ry="9" fill="url(#petalGrad)" opacity="0.7"/>
  <ellipse cx="32" cy="18" rx="4.5" ry="9" fill="url(#petalGrad)" opacity="0.7" transform="rotate(45 32 32)"/>
  <ellipse cx="32" cy="18" rx="4.5" ry="9" fill="url(#petalGrad)" opacity="0.7" transform="rotate(90 32 32)"/>
  <ellipse cx="32" cy="18" rx="4.5" ry="9" fill="url(#petalGrad)" opacity="0.7" transform="rotate(135 32 32)"/>
  <ellipse cx="32" cy="18" rx="4.5" ry="9" fill="url(#petalGrad)" opacity="0.7" transform="rotate(180 32 32)"/>
  <ellipse cx="32" cy="18" rx="4.5" ry="9" fill="url(#petalGrad)" opacity="0.7" transform="rotate(225 32 32)"/>
  <ellipse cx="32" cy="18" rx="4.5" ry="9" fill="url(#petalGrad)" opacity="0.7" transform="rotate(270 32 32)"/>
  <ellipse cx="32" cy="18" rx="4.5" ry="9" fill="url(#petalGrad)" opacity="0.7" transform="rotate(315 32 32)"/>
  <!-- Inner petals (8 smaller) -->
  <ellipse cx="32" cy="22" rx="3" ry="6" fill="#cc55ff" opacity="0.9" transform="rotate(22.5 32 32)"/>
  <ellipse cx="32" cy="22" rx="3" ry="6" fill="#cc55ff" opacity="0.9" transform="rotate(67.5 32 32)"/>
  <ellipse cx="32" cy="22" rx="3" ry="6" fill="#cc55ff" opacity="0.9" transform="rotate(112.5 32 32)"/>
  <ellipse cx="32" cy="22" rx="3" ry="6" fill="#cc55ff" opacity="0.9" transform="rotate(157.5 32 32)"/>
  <ellipse cx="32" cy="22" rx="3" ry="6" fill="#cc55ff" opacity="0.9" transform="rotate(202.5 32 32)"/>
  <ellipse cx="32" cy="22" rx="3" ry="6" fill="#cc55ff" opacity="0.9" transform="rotate(247.5 32 32)"/>
  <ellipse cx="32" cy="22" rx="3" ry="6" fill="#cc55ff" opacity="0.9" transform="rotate(292.5 32 32)"/>
  <ellipse cx="32" cy="22" rx="3" ry="6" fill="#cc55ff" opacity="0.9" transform="rotate(337.5 32 32)"/>
  <!-- Center -->
  <circle cx="32" cy="32" r="7" fill="url(#centerGrad)" stroke="#aa8800" stroke-width="1"/>
  <circle cx="30" cy="30" r="2.5" fill="white" opacity="0.35"/>
  <!-- Stem -->
  <line x1="32" y1="52" x2="32" y2="58" stroke="#44bb44" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 55 C28 53, 26 50, 28 48" stroke="#44bb44" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
