<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0808"/>
      <stop offset="100%" stop-color="#030202"/>
    </radialGradient>
    <radialGradient id="skull" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#eeeecc"/>
      <stop offset="70%" stop-color="#bbbbaa"/>
      <stop offset="100%" stop-color="#888877"/>
    </radialGradient>
    <radialGradient id="eyeSocket" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#111100"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3300" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#aa0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#220000" stroke-width="1.5"/>
  <!-- Crossed bones behind -->
  <line x1="10" y1="52" x2="54" y2="18" stroke="#666655" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="54" y1="52" x2="10" y2="18" stroke="#666655" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- Bone ends -->
  <circle cx="10" cy="52" r="4" fill="#666655" opacity="0.5"/>
  <circle cx="54" cy="52" r="4" fill="#666655" opacity="0.5"/>
  <circle cx="10" cy="18" r="4" fill="#666655" opacity="0.5"/>
  <circle cx="54" cy="18" r="4" fill="#666655" opacity="0.5"/>
  <!-- Skull -->
  <ellipse cx="32" cy="28" rx="16" ry="17" fill="url(#skull)" stroke="#888877" stroke-width="1.5"/>
  <!-- Skull jaw -->
  <rect x="22" y="38" width="20" height="10" rx="4" fill="url(#skull)" stroke="#888877" stroke-width="1.5"/>
  <!-- Jaw teeth -->
  <rect x="24" y="44" width="3" height="5" rx="1" fill="#888877"/>
  <rect x="29" y="44" width="3" height="6" rx="1" fill="#888877"/>
  <rect x="34" y="44" width="3" height="6" rx="1" fill="#888877"/>
  <rect x="39" y="44" width="3" height="5" rx="1" fill="#888877"/>
  <!-- Upper teeth -->
  <rect x="24" y="37" width="3" height="5" rx="1" fill="#888877"/>
  <rect x="29" y="36" width="3" height="6" rx="1" fill="#888877"/>
  <rect x="34" y="36" width="3" height="6" rx="1" fill="#888877"/>
  <rect x="39" y="37" width="3" height="5" rx="1" fill="#888877"/>
  <!-- Skull eye sockets -->
  <ellipse cx="24" cy="26" rx="6" ry="7" fill="url(#eyeSocket)"/>
  <ellipse cx="40" cy="26" rx="6" ry="7" fill="url(#eyeSocket)"/>
  <!-- Eye glow -->
  <ellipse cx="24" cy="26" rx="5" ry="6" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <ellipse cx="40" cy="26" rx="5" ry="6" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <!-- Nose cavity -->
  <path d="M30 33 L32 36 L34 33 Z" fill="#111100"/>
  <!-- Skull highlight -->
  <ellipse cx="26" cy="18" rx="5" ry="7" fill="white" opacity="0.12" transform="rotate(-20 26 18)"/>
  <!-- Crack detail -->
  <path d="M32 12 C33 16, 31 20, 33 24" stroke="#666655" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
