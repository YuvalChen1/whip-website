<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#aa8844"/>
      <stop offset="60%" stop-color="#885522"/>
      <stop offset="100%" stop-color="#553311"/>
    </radialGradient>
    <radialGradient id="eyeL" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffee88"/>
      <stop offset="50%" stop-color="#ddaa00"/>
      <stop offset="100%" stop-color="#886600"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#111122" stroke-width="1.5"/>
  <!-- Moon/stars in background -->
  <circle cx="50" cy="12" r="5" fill="#ffffcc" opacity="0.15"/>
  <circle cx="54" cy="10" r="4" fill="url(#bg)"/>
  <circle cx="14" cy="10" r="1" fill="white" opacity="0.5"/>
  <circle cx="8" cy="20" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="56" cy="28" r="0.8" fill="white" opacity="0.4"/>
  <!-- Ear tufts -->
  <path d="M18 22 L14 10 L22 18 Z" fill="#775533" stroke="#553311" stroke-width="1"/>
  <path d="M46 22 L50 10 L42 18 Z" fill="#775533" stroke="#553311" stroke-width="1"/>
  <!-- Inner ear -->
  <path d="M19 21 L16 13 L21 18 Z" fill="#cc6644" opacity="0.5"/>
  <path d="M45 21 L48 13 L43 18 Z" fill="#cc6644" opacity="0.5"/>
  <!-- Head -->
  <ellipse cx="32" cy="34" rx="20" ry="22" fill="url(#face)"/>
  <!-- Facial disk -->
  <ellipse cx="32" cy="36" rx="16" ry="18" fill="#cc9966" opacity="0.3"/>
  <!-- Eyes -->
  <circle cx="24" cy="30" r="7" fill="#111" stroke="#553311" stroke-width="1.5"/>
  <circle cx="40" cy="30" r="7" fill="#111" stroke="#553311" stroke-width="1.5"/>
  <circle cx="24" cy="30" r="5.5" fill="url(#eyeL)"/>
  <circle cx="40" cy="30" r="5.5" fill="url(#eyeL)"/>
  <circle cx="24" cy="30" r="3" fill="#050508"/>
  <circle cx="40" cy="30" r="3" fill="#050508"/>
  <!-- Eye shine -->
  <circle cx="22" cy="28" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="38" cy="28" r="1.5" fill="white" opacity="0.7"/>
  <!-- Beak -->
  <path d="M29 38 L32 44 L35 38 Z" fill="#ffcc44" stroke="#cc9900" stroke-width="0.8"/>
  <!-- Feather marks on face -->
  <path d="M16 30 C18 28, 20 30, 18 32" stroke="#664422" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M48 30 C46 28, 44 30, 46 32" stroke="#664422" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Wing hints -->
  <path d="M14 40 C10 36, 10 44, 14 46" stroke="#664422" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M50 40 C54 36, 54 44, 50 46" stroke="#664422" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
