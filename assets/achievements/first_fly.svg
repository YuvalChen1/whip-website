<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001a00"/>
      <stop offset="100%" stop-color="#000800"/>
    </radialGradient>
    <radialGradient id="body" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#44bb22"/>
      <stop offset="60%" stop-color="#228800"/>
      <stop offset="100%" stop-color="#114400"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffee44"/>
      <stop offset="100%" stop-color="#aaaa00"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#003300" stroke-width="1.5"/>
  <!-- Legs -->
  <line x1="18" y1="38" x2="10" y2="48" stroke="#228800" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="10" y1="48" x2="8" y2="44" stroke="#228800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="48" x2="6" y2="50" stroke="#228800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="40" x2="16" y2="52" stroke="#228800" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="52" x2="13" y2="49" stroke="#228800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="52" x2="12" y2="54" stroke="#228800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="38" x2="54" y2="48" stroke="#228800" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="48" x2="56" y2="44" stroke="#228800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="48" x2="58" y2="50" stroke="#228800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="40" x2="48" y2="52" stroke="#228800" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="52" x2="51" y2="49" stroke="#228800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="52" x2="52" y2="54" stroke="#228800" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Middle legs -->
  <line x1="20" y1="32" x2="10" y2="34" stroke="#228800" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="54" y2="34" stroke="#228800" stroke-width="2" stroke-linecap="round"/>
  <!-- Body (abdomen) -->
  <ellipse cx="32" cy="38" rx="14" ry="10" fill="url(#body)" stroke="#116600" stroke-width="1.5"/>
  <!-- Abdomen segments -->
  <line x1="20" y1="36" x2="44" y2="36" stroke="#116600" stroke-width="1" opacity="0.5"/>
  <line x1="19" y1="40" x2="45" y2="40" stroke="#116600" stroke-width="1" opacity="0.5"/>
  <!-- Head -->
  <circle cx="32" cy="24" r="10" fill="url(#body)" stroke="#116600" stroke-width="1.5"/>
  <!-- Head sheen -->
  <ellipse cx="28" cy="20" rx="4" ry="6" fill="white" opacity="0.15" transform="rotate(-20 28 20)"/>
  <!-- Eyes -->
  <circle cx="26" cy="22" r="4.5" fill="#110022" stroke="#333" stroke-width="0.5"/>
  <circle cx="38" cy="22" r="4.5" fill="#110022" stroke="#333" stroke-width="0.5"/>
  <circle cx="26" cy="22" r="3.5" fill="url(#eyeGrad)"/>
  <circle cx="38" cy="22" r="3.5" fill="url(#eyeGrad)"/>
  <circle cx="26" cy="22" r="1.5" fill="#111"/>
  <circle cx="38" cy="22" r="1.5" fill="#111"/>
  <circle cx="24.5" cy="20.5" r="1" fill="white" opacity="0.6"/>
  <circle cx="36.5" cy="20.5" r="1" fill="white" opacity="0.6"/>
  <!-- Antennae -->
  <path d="M28 15 C26 10, 22 8, 20 6" stroke="#33aa11" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M36 15 C38 10, 42 8, 44 6" stroke="#33aa11" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="20" cy="6" r="2" fill="#55cc33"/>
  <circle cx="44" cy="6" r="2" fill="#55cc33"/>
  <!-- Mandibles -->
  <path d="M28 32 C26 35, 24 34, 24 32" stroke="#116600" stroke-width="1" fill="none"/>
  <path d="M36 32 C38 35, 40 34, 40 32" stroke="#116600" stroke-width="1" fill="none"/>
</svg>
