<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#030308"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffffaa"/>
      <stop offset="70%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#221100" stroke-width="1.5"/>
  <!-- Glow behind bolt -->
  <path d="M36 8 L22 32 L30 32 L28 56 L44 28 L36 28 Z" fill="#ffcc00" opacity="0.2" filter="url(#blur)"/>
  <!-- Lightning bolt -->
  <path d="M36 8 L22 32 L30 32 L28 56 L44 28 L36 28 Z" fill="url(#bolt)"/>
  <!-- Inner highlight -->
  <path d="M35 12 L24 32 L31 32 L29.5 50 L40 31 L33 31 Z" fill="white" opacity="0.25"/>
  <!-- Small spark lines -->
  <line x1="20" y1="18" x2="16" y2="14" stroke="#ffcc00" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="18" y1="24" x2="13" y2="22" stroke="#ffcc00" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="46" y1="30" x2="51" y2="26" stroke="#ffcc00" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="38" x2="50" y2="38" stroke="#ffcc00" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Ambient glow -->
  <circle cx="32" cy="32" r="18" fill="url(#glow)"/>
</svg>
