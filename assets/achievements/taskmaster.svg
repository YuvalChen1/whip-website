<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0012"/>
      <stop offset="100%" stop-color="#040008"/>
    </radialGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555577"/>
      <stop offset="100%" stop-color="#333355"/>
    </linearGradient>
    <linearGradient id="clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aaaacc"/>
      <stop offset="100%" stop-color="#888899"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#220033" stroke-width="1.5"/>
  <!-- Clipboard body -->
  <rect x="16" y="20" width="32" height="36" rx="3" fill="url(#board)" stroke="#555577" stroke-width="1.5"/>
  <!-- Paper on clipboard -->
  <rect x="18" y="24" width="28" height="30" rx="2" fill="#f0f0ff" stroke="#8888aa" stroke-width="1"/>
  <!-- Clip at top -->
  <rect x="27" y="16" width="10" height="10" rx="2" fill="url(#clip)" stroke="#666688" stroke-width="1"/>
  <rect x="29" y="14" width="6" height="5" rx="2" fill="#999" stroke="#666" stroke-width="1"/>
  <!-- Checklist items -->
  <!-- Item 1 - checked green -->
  <rect x="22" y="29" width="6" height="6" rx="1" fill="#004400" stroke="#006600" stroke-width="1"/>
  <polyline points="23,32 25,34 28,30" fill="none" stroke="#00ff44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="31" y1="32" x2="42" y2="32" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Item 2 - checked green -->
  <rect x="22" y="38" width="6" height="6" rx="1" fill="#004400" stroke="#006600" stroke-width="1"/>
  <polyline points="23,41 25,43 28,39" fill="none" stroke="#00ff44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="31" y1="41" x2="42" y2="41" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Item 3 - unchecked -->
  <rect x="22" y="47" width="6" height="6" rx="1" fill="none" stroke="#666" stroke-width="1"/>
  <line x1="31" y1="50" x2="40" y2="50" stroke="#888" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Star accent -->
  <polygon points="46,14 47.2,17.6 51,17.6 48,19.9 49.2,23.5 46,21.2 42.8,23.5 44,19.9 41,17.6 44.8,17.6" fill="#ffcc00" opacity="0.9" transform="scale(0.7) translate(20,4)"/>
</svg>
