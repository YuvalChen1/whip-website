<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#04040a"/>
    </radialGradient>
    <linearGradient id="watchBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ccccdd"/>
      <stop offset="40%" stop-color="#9999bb"/>
      <stop offset="100%" stop-color="#555577"/>
    </linearGradient>
    <linearGradient id="face" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eeeeff"/>
      <stop offset="100%" stop-color="#ccccee"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#222233" stroke-width="1.5"/>
  <!-- Watch outer case -->
  <circle cx="32" cy="32" r="20" fill="url(#watchBody)" stroke="#888899" stroke-width="2"/>
  <!-- Crown (winder) -->
  <rect x="50" y="29" width="5" height="6" rx="2" fill="#aaaacc" stroke="#666688" stroke-width="1"/>
  <!-- Top lug -->
  <rect x="29" y="10" width="6" height="4" rx="1" fill="#888899"/>
  <!-- Bottom lug -->
  <rect x="29" y="50" width="6" height="4" rx="1" fill="#888899"/>
  <!-- Watch face -->
  <circle cx="32" cy="32" r="16" fill="#f0f0ff" stroke="#999" stroke-width="1"/>
  <!-- Hour markers -->
  <line x1="32" y1="17" x2="32" y2="20" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="32" y2="47" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="32" x2="20" y2="32" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="47" y2="32" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Minute markers -->
  <line x1="42" y1="20" x2="40.5" y2="22.5" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="20" x2="23.5" y2="22.5" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="42" y1="44" x2="40.5" y2="41.5" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="44" x2="23.5" y2="41.5" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
  <!-- Hour hand pointing to ~12 -->
  <line x1="32" y1="32" x2="32" y2="22" stroke="#222244" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand pointing to ~12 (slightly off) -->
  <line x1="32" y1="32" x2="36" y2="20" stroke="#333366" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Second hand - red, pointing ~right -->
  <line x1="32" y1="32" x2="44" y2="30" stroke="#ff2222" stroke-width="1" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="26" y2="34" stroke="#ff2222" stroke-width="1" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#333" stroke="#ff2222" stroke-width="1"/>
  <!-- Speed lines suggesting fast motion -->
  <line x1="8" y1="26" x2="14" y2="26" stroke="#4466ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="8" y1="30" x2="13" y2="30" stroke="#4466ff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="8" y1="34" x2="14" y2="34" stroke="#4466ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
