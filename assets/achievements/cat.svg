<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14141c"/>
      <stop offset="100%" stop-color="#08080c"/>
    </radialGradient>
    <radialGradient id="catFace" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#3c3c4a"/>
      <stop offset="70%" stop-color="#23232e"/>
      <stop offset="100%" stop-color="#14141c"/>
    </radialGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#a0ff3b"/>
      <stop offset="80%" stop-color="#72c418"/>
      <stop offset="100%" stop-color="#3b7a05"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#3a3a4a" stroke-width="1.5"/>
  <!-- Left Ear -->
  <path d="M18 24 L12 8 L25 18 Z" fill="#23232e" stroke="#3a3a4a" stroke-width="1"/>
  <path d="M19 23 L14 11 L23 18 Z" fill="#ff9999" opacity="0.4"/>
  <!-- Right Ear -->
  <path d="M46 24 L52 8 L39 18 Z" fill="#23232e" stroke="#3a3a4a" stroke-width="1"/>
  <path d="M45 23 L50 11 L41 18 Z" fill="#ff9999" opacity="0.4"/>
  <!-- Cat Face -->
  <ellipse cx="32" cy="35" rx="18" ry="15" fill="url(#catFace)" stroke="#3a3a4a" stroke-width="1"/>
  <!-- Glowing Eyes -->
  <ellipse cx="25" cy="32" rx="4.5" ry="3" fill="url(#eyeGrad)" transform="rotate(-10 25 32)"/>
  <ellipse cx="39" cy="32" rx="4.5" ry="3" fill="url(#eyeGrad)" transform="rotate(10 39 32)"/>
  <!-- Cat Slit Pupils -->
  <line x1="25" y1="30" x2="25" y2="34" stroke="#08080c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="39" y1="30" x2="39" y2="34" stroke="#08080c" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Eye Reflections -->
  <circle cx="23.5" cy="31" r="0.8" fill="white"/>
  <circle cx="37.5" cy="31" r="0.8" fill="white"/>
  <!-- Nose -->
  <polygon points="30,37 34,37 32,39" fill="#ff9999"/>
  <!-- Mouth -->
  <path d="M30 41 Q32 43, 32 41 Q32 43, 34 41" stroke="#ff9999" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="12" y1="38" x2="4" y2="37" stroke="#6a6a7a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="12" y1="41" x2="3" y2="42" stroke="#6a6a7a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="52" y1="38" x2="60" y2="37" stroke="#6a6a7a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="52" y1="41" x2="61" y2="42" stroke="#6a6a7a" stroke-width="0.8" stroke-linecap="round"/>
</svg>
