<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001a08"/>
      <stop offset="100%" stop-color="#00080a"/>
    </radialGradient>
    <linearGradient id="swatterHandle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ddaa66"/>
      <stop offset="100%" stop-color="#996633"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#003311" stroke-width="1.5"/>
  <!-- Mini swatter head (grid) -->
  <rect x="26" y="12" width="22" height="20" rx="3" fill="#334" stroke="#556" stroke-width="1.5"/>
  <!-- Grid lines vertical -->
  <line x1="31" y1="13" x2="31" y2="31" stroke="#667" stroke-width="1" opacity="0.7"/>
  <line x1="36" y1="13" x2="36" y2="31" stroke="#667" stroke-width="1" opacity="0.7"/>
  <line x1="41" y1="13" x2="41" y2="31" stroke="#667" stroke-width="1" opacity="0.7"/>
  <!-- Grid lines horizontal -->
  <line x1="27" y1="17" x2="47" y2="17" stroke="#667" stroke-width="1" opacity="0.7"/>
  <line x1="27" y1="22" x2="47" y2="22" stroke="#667" stroke-width="1" opacity="0.7"/>
  <line x1="27" y1="27" x2="47" y2="27" stroke="#667" stroke-width="1" opacity="0.7"/>
  <!-- Handle -->
  <rect x="35" y="32" width="5" height="22" rx="2.5" fill="url(#swatterHandle)" stroke="#7a4f22" stroke-width="1"/>
  <!-- Mini fly (smashed) -->
  <ellipse cx="35" cy="22" rx="4" ry="2.5" fill="#228800" opacity="0.8"/>
  <circle cx="33" cy="21" r="1" fill="#44aa00" opacity="0.9"/>
  <circle cx="37" cy="21" r="1" fill="#44aa00" opacity="0.9"/>
  <!-- Fly wings crossed out -->
  <line x1="31" y1="20" x2="35" y2="23" stroke="#33ff00" stroke-width="0.8" opacity="0.6"/>
  <line x1="39" y1="20" x2="35" y2="23" stroke="#33ff00" stroke-width="0.8" opacity="0.6"/>
  <!-- Impact stars -->
  <text x="20" y="20" font-size="8" fill="#ffcc00" opacity="0.8">✦</text>
  <text x="44" y="16" font-size="6" fill="#ffcc00" opacity="0.6">✦</text>
  <text x="22" y="30" font-size="5" fill="#ffcc00" opacity="0.5">✦</text>
  <!-- "small" indicator dots -->
  <circle cx="14" cy="46" r="2" fill="#226633" opacity="0.7"/>
  <circle cx="20" cy="50" r="1.5" fill="#226633" opacity="0.6"/>
  <circle cx="14" cy="54" r="1" fill="#226633" opacity="0.5"/>
</svg>
