<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#021c24"/>
      <stop offset="100%" stop-color="#010c10"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#557c8c"/>
      <stop offset="65%" stop-color="#314e5a"/>
      <stop offset="100%" stop-color="#1b2e37"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#0088aa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#0088a8" stroke-width="1.5"/>
  <!-- Antenna -->
  <line x1="32" y1="18" x2="32" y2="10" stroke="#557c8c" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="9" r="3" fill="#00ffff" stroke="#0088a8" stroke-width="0.5"/>
  <!-- Robot Head Base -->
  <rect x="18" y="20" width="28" height="24" rx="4" fill="url(#metal)" stroke="#1b2e37" stroke-width="1.5"/>
  <!-- Ears -->
  <rect x="14" y="27" width="4" height="10" rx="1" fill="#314e5a" stroke="#1b2e37" stroke-width="1"/>
  <rect x="46" y="27" width="4" height="10" rx="1" fill="#314e5a" stroke="#1b2e37" stroke-width="1"/>
  <!-- Visor Area -->
  <rect x="21" y="24" width="22" height="10" rx="2" fill="#0e171c" stroke="#1b2e37" stroke-width="1"/>
  <!-- Eyes Glowing Cyan -->
  <circle cx="26" cy="29" r="4.5" fill="url(#eyeGlow)"/>
  <circle cx="26" cy="29" r="2.2" fill="#ffffff"/>
  <circle cx="38" cy="29" r="4.5" fill="url(#eyeGlow)"/>
  <circle cx="38" cy="29" r="2.2" fill="#ffffff"/>
  <!-- Mouth Grid -->
  <rect x="25" y="37" width="14" height="3" fill="#1b2e37" rx="0.5"/>
  <line x1="28" y1="37" x2="28" y2="40" stroke="#00ffff" stroke-width="0.8" opacity="0.6"/>
  <line x1="32" y1="37" x2="32" y2="40" stroke="#00ffff" stroke-width="0.8" opacity="0.6"/>
  <line x1="36" y1="37" x2="36" y2="40" stroke="#00ffff" stroke-width="0.8" opacity="0.6"/>
  <!-- Panel Lines/Rivets -->
  <circle cx="21" cy="41" r="0.8" fill="#557c8c" opacity="0.8"/>
  <circle cx="43" cy="41" r="0.8" fill="#557c8c" opacity="0.8"/>
</svg>
