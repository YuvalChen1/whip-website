<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f3d"/>
      <stop offset="100%" stop-color="#050a14"/>
    </radialGradient>
    <linearGradient id="mane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb3ba"/>
      <stop offset="50%" stop-color="#baffc9"/>
      <stop offset="100%" stop-color="#bae1ff"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9d0"/>
      <stop offset="50%" stop-color="#ffe600"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#9b51e0" stroke-width="1.5"/>
  <!-- Mane behind Head -->
  <path d="M14 36 C10 42, 14 52, 24 54 C30 55, 34 50, 36 44 Z" fill="url(#mane)"/>
  <!-- Head (White unicorn profile facing left-front) -->
  <path d="M42 46 C42 42, 44 26, 36 24 C28 22, 22 28, 20 36 C18 40, 20 44, 24 45 C30 46, 36 48, 42 46 Z" fill="#ffffff" stroke="#bae1ff" stroke-width="1"/>
  <!-- Snout -->
  <path d="M20 36 C19 38, 20 42, 24 43 Z" fill="#ffd5e5" opacity="0.6"/>
  <circle cx="22" cy="39" r="0.8" fill="#555"/>
  <!-- Cute Closed Eye (happy expression) -->
  <path d="M28 32 Q30 35, 32 32" stroke="#4a5568" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="34" y2="30" stroke="#4a5568" stroke-width="1" stroke-linecap="round"/>
  <!-- Ear -->
  <path d="M38 24 L42 12 L44 20 Z" fill="#ffffff" stroke="#bae1ff" stroke-width="0.8"/>
  <path d="M39 23 L42 15 L43 19 Z" fill="#ffd5e5" opacity="0.6"/>
  <!-- Glowing Golden Horn -->
  <path d="M28 24 L22 4 L32 20 Z" fill="url(#horn)" stroke="#cc9900" stroke-width="0.8"/>
  <line x1="26" y1="19" x2="29" y2="13" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Star Sparkles near Horn -->
  <path d="M16 12 L17 14 L19 12 L17 10Z" fill="#ffe600" opacity="0.9"/>
  <path d="M34 6 L35 8 L37 6 L35 4Z" fill="#ffb3ba" opacity="0.8"/>
</svg>
