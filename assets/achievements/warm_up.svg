<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1200"/>
      <stop offset="100%" stop-color="#0d0500"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame1" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fff7a0"/>
      <stop offset="40%" stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffeeaa"/>
      <stop offset="50%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#aa1500"/>
    </linearGradient>
    <linearGradient id="innerFlame" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffcc"/>
      <stop offset="60%" stop-color="#ffdd00"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#5a2000" stroke-width="1.5"/>
  <!-- Glow -->
  <ellipse cx="32" cy="46" rx="18" ry="12" fill="url(#glow)"/>
  <!-- Outer flame -->
  <path d="M32 10 C28 18, 18 20, 20 30 C22 38, 16 40, 20 50 C24 58, 40 58, 44 50 C48 40, 42 38, 44 30 C46 20, 36 18, 32 10Z" fill="url(#flame1)" opacity="0.9"/>
  <!-- Left sub-flame -->
  <path d="M24 22 C20 28, 16 32, 18 40 C20 46, 24 50, 24 50 C22 44, 24 38, 26 34 C28 30, 26 26, 24 22Z" fill="url(#flame2)" opacity="0.7"/>
  <!-- Right sub-flame -->
  <path d="M40 22 C44 28, 48 32, 46 40 C44 46, 40 50, 40 50 C42 44, 40 38, 38 34 C36 30, 38 26, 40 22Z" fill="url(#flame2)" opacity="0.7"/>
  <!-- Inner core -->
  <path d="M32 22 C30 27, 25 30, 26 37 C27 42, 30 46, 32 48 C34 46, 37 42, 38 37 C39 30, 34 27, 32 22Z" fill="url(#innerFlame)" opacity="0.95"/>
  <!-- Highlight dot -->
  <circle cx="30" cy="30" r="3" fill="white" opacity="0.5"/>
</svg>
