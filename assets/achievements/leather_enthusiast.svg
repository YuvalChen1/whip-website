<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#100800"/>
      <stop offset="100%" stop-color="#060300"/>
    </radialGradient>
    <linearGradient id="leather1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5e3c"/>
      <stop offset="50%" stop-color="#6b3e1c"/>
      <stop offset="100%" stop-color="#4a2800"/>
    </linearGradient>
    <linearGradient id="buckle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ddbb66"/>
      <stop offset="100%" stop-color="#aa8833"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="31" fill="url(#bg)" stroke="#3a1800" stroke-width="1.5"/>
  <!-- Background leather texture hints -->
  <line x1="8" y1="20" x2="56" y2="20" stroke="#5a3010" stroke-width="0.5" opacity="0.4"/>
  <line x1="8" y1="44" x2="56" y2="44" stroke="#5a3010" stroke-width="0.5" opacity="0.4"/>
  <!-- Main leather strap -->
  <rect x="6" y="26" width="52" height="12" rx="6" fill="url(#leather1)" stroke="#3a1800" stroke-width="1.5"/>
  <!-- Leather texture stitching (top edge) -->
  <line x1="10" y1="28" x2="14" y2="28" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="17" y1="28" x2="21" y2="28" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="24" y1="28" x2="28" y2="28" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="36" y1="28" x2="40" y2="28" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="43" y1="28" x2="47" y2="28" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="50" y1="28" x2="54" y2="28" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <!-- Leather texture stitching (bottom edge) -->
  <line x1="10" y1="36" x2="14" y2="36" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="17" y1="36" x2="21" y2="36" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="24" y1="36" x2="28" y2="36" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="36" y1="36" x2="40" y2="36" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="43" y1="36" x2="47" y2="36" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="50" y1="36" x2="54" y2="36" stroke="#aa7744" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <!-- Buckle frame -->
  <rect x="27" y="24" width="10" height="16" rx="2" fill="url(#buckle)" stroke="#886622" stroke-width="1.5"/>
  <rect x="29" y="26" width="6" height="12" rx="1" fill="#5a3810" stroke="none"/>
  <!-- Buckle pin -->
  <rect x="31" y="24" width="2" height="18" rx="1" fill="url(#buckle)" stroke="#886622" stroke-width="0.5"/>
  <!-- Buckle shine -->
  <ellipse cx="30" cy="27" rx="2" ry="1" fill="white" opacity="0.3" transform="rotate(-20 30 27)"/>
  <!-- Hole dots on strap -->
  <circle cx="44" cy="32" r="1.2" fill="#3a1800" stroke="#5a2800" stroke-width="0.5"/>
  <circle cx="48" cy="32" r="1.2" fill="#3a1800" stroke="#5a2800" stroke-width="0.5"/>
  <circle cx="52" cy="32" r="1.2" fill="#3a1800" stroke="#5a2800" stroke-width="0.5"/>
</svg>
