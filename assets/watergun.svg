<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.6));">
  <!-- rear-view water blaster pointing forward (into the screen) -->
  <!-- Handle / Grip (bottom center) -->
  <path d="M 28 44 L 24 62 L 40 62 L 36 44 Z" fill="#ff7f27" stroke="#e05300" stroke-width="2" />
  
  <!-- Main Gun Body (rear view) -->
  <rect x="18" y="24" width="28" height="22" rx="6" fill="#ff7f27" stroke="#e05300" stroke-width="2" />
  
  <!-- Water Tank (large cylinder behind the barrel) -->
  <rect x="14" y="20" width="36" height="12" rx="4" fill="#00a2e8" opacity="0.8" stroke="#007bb6" stroke-width="1.5" />
  <rect x="18" y="22" width="28" height="3" fill="#ffffff" opacity="0.4" />
  
  <!-- Barrel extending forward (tapering towards the front) -->
  <path d="M 22 28 L 26 8 L 38 8 L 42 28 Z" fill="#ff7f27" stroke="#e05300" stroke-width="2" />
  
  <!-- Gun Nozzle (front of barrel, centered at top) -->
  <ellipse cx="32" cy="8" rx="6" ry="3" fill="#3f48cc" stroke="#1f2375" stroke-width="1.5" />
  <circle cx="32" cy="8" r="2.5" fill="#00e5ff" />
  
  <!-- Sight / Scope on top of rear body -->
  <rect x="30" y="16" width="4" height="8" fill="#ffcc00" stroke="#d4ab00" stroke-width="1" />
</svg>
